name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref_name }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: clawith
          POSTGRES_USER: clawith
          POSTGRES_PASSWORD: clawith
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U clawith -d clawith"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://clawith:clawith@127.0.0.1:5432/clawith
      REDIS_URL: redis://127.0.0.1:6379/0
      AGENT_DATA_DIR: ${{ github.workspace }}/backend/agent_data
      AGENT_TEMPLATE_DIR: ${{ github.workspace }}/backend/agent_templates
      SECRET_KEY: ci-secret-key
      JWT_SECRET_KEY: ci-jwt-secret
      PUBLIC_BASE_URL: http://localhost:8000
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run Ruff
        run: python -m ruff check app tests

      - name: Run Alembic upgrade
        run: alembic upgrade head

      - name: Check Alembic current revision
        run: alembic current

      - name: Run pytest
        run: python -m pytest tests -q

      - name: Validate deploy script syntax
        working-directory: ${{ github.workspace }}
        run: bash -n scripts/deploy/deploy_from_github_actions.sh

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build
